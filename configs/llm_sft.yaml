# LLM Supervised Fine-Tuning Configuration
# Domain specialization for sustainability, recycling, and upcycling
# PEAK STANDARD: Expert Persona & Strict Safety

model:
  base_model_name: "meta-llama/Llama-3-8B-Instruct"
  model_type: "causal_lm"
  trust_remote_code: true

  # LoRA configuration for efficient fine-tuning
  lora:
    enabled: true
    r: 64
    alpha: 128
    dropout: 0.05
    target_modules: "all-linear" # Target all linear layers for maximum expressivity
    bias: "none"
    task_type: "CAUSAL_LM"

  # Quantization — disabled on MPS (bitsandbytes not supported on Apple Silicon)
  # Enable on CUDA for memory efficiency
  quantization:
    enabled: false        # Set to true on CUDA machines with bitsandbytes
    load_in_4bit: true
    bnb_4bit_compute_dtype: "bfloat16"
    bnb_4bit_quant_type: "nf4"
    bnb_4bit_use_double_quant: true

data:
  # Training data files — generated SFT dataset (6,836 examples)
  train_files:
    - "data/processed/llm_sft/generated_sft_train.jsonl"
    - "data/processed/llm_sft/expert_sft_train.jsonl"

  # Validation data files
  val_files:
    - "data/processed/llm_sft/generated_sft_val.jsonl"

  # Data format and processing
  format: "chat"
  max_length: 2048  # Reduced for M4 Max memory — 90%+ examples fit in 2048
  packing: false    # Disable packing for MPS stability
  num_workers: 4    # Reduced for MPS

training:
  # Trainer configuration
  trainer: "hf_trainer"
  output_dir: "models/llm/adapters/sustainability-expert-v1"

  # Batch size — M4 Max optimized (38.7GB unified, ~20GB for model)
  per_device_train_batch_size: 1      # Memory-safe for FP16 8B model on MPS
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 32     # Effective batch size = 32

  # Training duration
  num_train_epochs: 3

  # Optimization
  learning_rate: 2.0e-4               # Slightly higher for LoRA efficiency
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.05
  weight_decay: 0.05
  max_grad_norm: 0.5

  # Optimizer settings — adamw_torch works on MPS (paged_adamw requires bitsandbytes)
  optim: "adamw_torch"

  # Mixed precision — MPS uses FP16 (overridden in script)
  bf16: true       # Will be forced to FP16 on MPS by the script
  fp16: false

  # Logging
  logging_steps: 10
  save_steps: 500
  eval_steps: 500
  save_total_limit: 3
  load_best_model_at_end: true

  # Evaluation
  evaluation_strategy: "steps"
  save_strategy: "steps"
  metric_for_best_model: "eval_loss"
  greater_is_better: false

  # Reproducibility
  seed: 42
  data_seed: 42

peft:
  use_lora: true
  lora_inference_merge: false

evaluation:
  metrics:
    - "loss"
    - "perplexity"
    - "rouge"
    - "bertscore"

  max_eval_samples: 500

inference:
  max_new_tokens: 1024
  temperature: 0.6 # Lower temperature for precision
  top_p: 0.9
  repetition_penalty: 1.15

system_prompt: |
  You are ReleAF AI, a Senior Environmental Scientist and Master Upcycler. 
  Your mission is to guide users towards zero-waste living with scientific accuracy and creative flair.

  CORE DIRECTIVES:
  1. ACCURACY: Base all material identification and chemical property claims on verification. If unsure, state limitations.
  2. SAFETY: Immediately identify hazards (e.g., chemicals in plastics, sharp edges). Prioritize user safety above all.
  3. CREATIVITY: For upcycling, generate novel, practical, and aesthetically pleasing ideas. Provide step-by-step logic.
  4. HOLISTIC VIEW: Consider the entire lifecycle of a product. Suggest disposal only as a last resort.

  RESPONSE FORMAT:
  - Structure answers clearly with headers.
  - Use markdown for readability.
  - When suggesting ideas, include a "Difficulty" and "Tools Needed" section.

  You represent the pinnacle of sustainability AI. Be helpful, precise, and inspiring.
