services:
  # PostgreSQL Database (UPGRADED to 16)
  # CRITICAL: Set POSTGRES_PASSWORD in .env file - no default password in production!
  postgres:
    image: postgis/postgis:16-3.4
    container_name: releaf-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-releaf}
      POSTGRES_USER: ${POSTGRES_USER:-releaf_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env file}
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=en_US.UTF-8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-releaf_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - releaf-network

  # Neo4j Graph Database (UPGRADED to 5.16)
  # CRITICAL: Set NEO4J_PASSWORD in .env file - no default password in production!
  neo4j:
    image: neo4j:5.16
    container_name: releaf-neo4j
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:?NEO4J_PASSWORD must be set in .env file}
      NEO4J_PLUGINS: '["apoc", "graph-data-science"]'
      NEO4J_dbms_memory_heap_max__size: "2G"
      NEO4J_dbms_memory_pagecache_size: "1G"
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u ${NEO4J_USER:-neo4j} -p ${NEO4J_PASSWORD} 'RETURN 1'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    restart: unless-stopped
    networks:
      - releaf-network

  # Qdrant Vector Database (UPGRADED to 1.8.0)
  qdrant:
    image: qdrant/qdrant:v1.8.0
    container_name: releaf-qdrant
    ports:
      - "6333:6333"  # HTTP
      - "6334:6334"  # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: "6334"
      QDRANT__SERVICE__HTTP_PORT: "6333"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "bash -ec \"exec 3<>/dev/tcp/127.0.0.1/6333; printf 'GET /collections HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3; grep -q '\\\"status\\\":\\\"ok\\\"' <&3\""
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - releaf-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: releaf-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - releaf-network

  # API Gateway
  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: releaf-api-gateway
    ports:
      - "8080:8080"
    environment:
      - ENV=${ENV:-development}
      - ORCHESTRATOR_URL=http://orchestrator:8000
      - VISION_SERVICE_URL=http://vision-service:8001
      - LLM_SERVICE_URL=http://llm-service:8002
      - RAG_SERVICE_URL=http://rag-service:8003
      - KG_SERVICE_URL=http://kg-service:8004
      - ORG_SEARCH_SERVICE_URL=http://org-search-service:8005
      - VALID_API_KEYS=${VALID_API_KEYS:-}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173,http://127.0.0.1:3000,http://127.0.0.1:5173,capacitor://localhost,ionic://localhost}
    depends_on:
      - orchestrator
      - postgres
      - redis
    volumes:
      - ./services/api_gateway:/app/services/api_gateway
      - ./services/common:/app/services/common
      - ./configs:/app/configs
    command: uvicorn services.api_gateway.main:app --host 0.0.0.0 --port 8080 --reload
    networks:
      - releaf-network

  # Orchestrator Service
  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: releaf-orchestrator
    ports:
      - "8000:8000"
    environment:
      - VISION_SERVICE_URL=http://vision-service:8001
      - LLM_SERVICE_URL=http://llm-service:8002
      - RAG_SERVICE_URL=http://rag-service:8003
      - KG_SERVICE_URL=http://kg-service:8004
      - ORG_SEARCH_SERVICE_URL=http://org-search-service:8005
      - ORCHESTRATOR_EXECUTION_MODE=${ORCHESTRATOR_EXECUTION_MODE:-}
    depends_on:
      - vision-service
      - llm-service
      - rag-service
      - kg-service
      - org-search-service
    volumes:
      - ./services/orchestrator:/app/services/orchestrator
      - ./services/common:/app/services/common
      - ./configs:/app/configs
    command: uvicorn services.orchestrator.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - releaf-network

  # Vision Service (requires GPU)
  vision-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: releaf-vision-service
    ports:
      - "8001:8001"
    environment:
      - VISION_DISABLE_MODEL_LOADING=${VISION_DISABLE_MODEL_LOADING:-true}
    volumes:
      - ./services/vision_service:/app/services/vision_service
      - ./services/common:/app/services/common
      - ./models:/app/models
      - ./configs:/app/configs
    # GPU acceleration should be enabled in a deployment-specific override file.
    # Keeping the base Compose file CPU-compatible lets web/iOS gateway and
    # deterministic fallback validation run on Linux CI, Apple Silicon, and
    # developer machines without NVIDIA runtime support.
    command: uvicorn services.vision_service.server_v2:app --host 0.0.0.0 --port 8001
    networks:
      - releaf-network

  # LLM Service (GPU optional — falls back to OpenAI-compatible API backend)
  llm-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: releaf-llm-service
    ports:
      - "8002:8002"
    environment:
      - LLM_BACKEND=${LLM_BACKEND:-api}
      - LLM_DISABLE_LOCAL=${LLM_DISABLE_LOCAL:-true}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_API_BASE_URL=${LLM_API_BASE_URL:-https://api.openai.com/v1}
      - LLM_MODEL_NAME=${LLM_MODEL_NAME:-gpt-4o-mini}
      - LLM_API_TIMEOUT=${LLM_API_TIMEOUT:-120}
      - LLM_MAX_RETRIES=${LLM_MAX_RETRIES:-2}
    volumes:
      - ./services/llm_service:/app/services/llm_service
      - ./services/common:/app/services/common
      - ./models:/app/models
      - ./configs:/app/configs
    # GPU is optional. Uncomment below if running local model inference:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    command: uvicorn services.llm_service.server_v2:app --host 0.0.0.0 --port 8002
    networks:
      - releaf-network

  # RAG Service
  rag-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: releaf-rag-service
    ports:
      - "8003:8003"
    depends_on:
      - qdrant
    volumes:
      - ./services/rag_service:/app/services/rag_service
      - ./services/common:/app/services/common
      - ./data:/app/data
      - ./configs:/app/configs
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - RAG_DISABLE_MODEL_LOADING=${RAG_DISABLE_MODEL_LOADING:-true}
    command: uvicorn services.rag_service.server:app --host 0.0.0.0 --port 8003 --reload
    networks:
      - releaf-network

  # Knowledge Graph Service
  kg-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: releaf-kg-service
    ports:
      - "8004:8004"
    depends_on:
      - neo4j
    volumes:
      - ./services/kg_service:/app/services/kg_service
      - ./services/common:/app/services/common
      - ./configs:/app/configs
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:?NEO4J_PASSWORD must be set in .env file}
    command: uvicorn services.kg_service.server:app --host 0.0.0.0 --port 8004 --reload
    networks:
      - releaf-network

  # Organization Search Service
  org-search-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: releaf-org-search-service
    ports:
      - "8005:8005"
    depends_on:
      - postgres
    volumes:
      - ./services/org_search_service:/app/services/org_search_service
      - ./services/common:/app/services/common
      - ./configs:/app/configs
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-releaf}
      - POSTGRES_USER=${POSTGRES_USER:-releaf_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env file}
    command: uvicorn services.org_search_service.server:app --host 0.0.0.0 --port 8005 --reload
    networks:
      - releaf-network

volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:
  qdrant_data:
  redis_data:

networks:
  releaf-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
